<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalliopi-Angeliki-Papadopoulou-of-Eleusis</title>
    <meta name="description" content="She awaits any eager follower. The Eleusinian mysteries are not for the faint of heart." />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f4f0e6;
            font-family: 'Segoe UI', 'Georgia', 'Times New Roman', serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: #fffef7;
            border-radius: 24px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            border: 1px solid #e6dfcf;
        }

        .header {
            background: #2c2b28;
            color: #f0e8d5;
            padding: 1.2rem 1.8rem;
            text-align: center;
            border-bottom: 3px solid #b89a6b;
        }

        .header h1 {
            font-size: 1.3rem;
            font-weight: 400;
            letter-spacing: 1px;
            word-break: break-word;
        }

        .header p {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 6px;
            font-family: monospace;
        }

        .story-card {
            padding: 2rem 1.8rem;
            background: #ffffff;
            border-bottom: 1px solid #ede6d9;
        }

        .story-text {
            font-size: 1.2rem;
            line-height: 1.5;
            color: #2d2a24;
            font-weight: 450;
        }

        .choices-area {
            padding: 1.2rem 1.8rem 2rem 1.8rem;
            background: #fefcf7;
        }

        .choice-btn {
            display: block;
            width: 100%;
            margin-bottom: 0.8rem;
            padding: 0.9rem 1.2rem;
            background: #f1ede4;
            border: 1px solid #dbd2c2;
            border-radius: 40px;
            font-size: 1rem;
            font-family: inherit;
            color: #3a352c;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .choice-btn:hover {
            background: #e7dfd2;
            border-color: #b89a6b;
            transform: translateX(4px);
        }

        .choice-btn:active {
            background: #d9cebc;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            padding: 1rem;
            color: #a39b8a;
            border-top: 1px solid #ede6d9;
            background: #fefcf7;
        }

        @media (max-width: 500px) {
            .story-text { font-size: 1rem; }
            .header h1 { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⚘ Kalliopi Angeliki Papadopoulou of Eleusis ⚘</h1>
        <p>τὸ μαντεῖον · the Oracle</p>
    </div>

    <div class="story-card">
        <div class="story-text" id="storyText">
            <!-- Dynamic story text -->
        </div>
    </div>
    <div class="choices-area" id="choicesContainer">
        <!-- Choice buttons -->
    </div>
    <footer>
        ⋆ The initiates of the Eleusinian Mysteries speak through this place ⋆
    </footer>
</div>

<script>
    // Oracle name from page title
    const ORACLE_NAME = document.title;
    const DISPLAY_NAME = ORACLE_NAME.replace(/-/g, ' ');

    // Decision tree – all texts in English
    const storyGraph = {
        start: {
            text: `As you walk up the narrow path, the door of an ancient stone house creaks open. ${DISPLAY_NAME} steps out, a laurel wreath in her hair. She looks at you calmly. "A stranger in Eleusis? Your arrival has been whispered for some time." She tilts her head. "What brings you to me?"`,
            options: [
                { label: "„I seek the translation of the ancient Greek text from the game.“", next: "seekTranslation" },
                { label: "„Just curiosity. Who are you really?“", next: "whoAreYou" },
                { label: "„I lost my way. Is there a place to rest here?“", next: "rest" }
            ]
        },
        seekTranslation: {
            text: `A quiet smile. "The text you mean … it is no ordinary Greek. It is a riddle of the Mysteries. If you want the translation, you must entrust me with something personal." She waits.`,
            options: [
                { label: "Tell her a small secret (make one up).", next: "secretTold" },
                { label: "„I don't trust strangers with anything.“", next: "refuse" }
            ]
        },
        secretTold: {
            text: `She nods slowly. "Good. Your honesty honours you. The translation is: 'The key is not made of bronze, but of silence.' I can tell you no more." She turns and steps back into the half-darkness.`,
            options: [
                { label: "„Thank you … I'll go.“", next: "end" },
                { label: "„Wait – one more question!“", next: "desperateQuestion" }
            ]
        },
        desperateQuestion: {
            text: `She pauses without turning around. "The next answer will cost you a joke. A bad one."`,
            options: [
                { label: "„Why did the Greek throw his computer into the Aegean? – Because he wanted Windows on Greek time.“", next: "badJoke" },
                { label: "„I have no joke.“", next: "refuse" }
            ]
        },
        badJoke: {
            text: `A short, dry laugh. "Enough. You may leave. Remember: never drink the yellow liquid." She disappears inside.`,
            options: [
                { label: "Confused, take the way back", next: "end" }
            ]
        },
        whoAreYou: {
            text: `${DISPLAY_NAME} raises an eyebrow. "Some call me a keeper of old things. Others a dreamer. The name you know is only an echo. Do you truly want the truth?"`,
            options: [
                { label: "„Yes, I want to know.“", next: "truth" },
                { label: "„Maybe not after all.“", next: "start" }
            ]
        },
        truth: {
            text: `She leans forward and whispers: "I am the person who programmed your decision tree. And this dialogue ends right here." A spark in her eyes.`,
            options: [
                { label: "„…Touché.“ (Back to the beginning)", next: "start" }
            ]
        },
        rest: {
            text: `"Rest? Sit on that old olive stump over there. But be careful – the goats here steal anything that shines." She disappears for a moment and returns with a jug of water. "Are you here because of the game text? Everyone comes because of it."`,
            options: [
                { label: "„Yes, actually.“", next: "seekTranslation" },
                { label: "„No, I just wanted to see the landscape.“", next: "landscape" }
            ]
        },
        landscape: {
            text: `"Then look around. Eleusis is quiet today." She sits next to you and falls silent. After a while she says: "The translation you're not looking for is: 'The yellow liquid is dangerous.'" A final sip of water, then she leaves.`,
            options: [
                { label: "Stand up and leave", next: "end" }
            ]
        },
        refuse: {
            text: `${DISPLAY_NAME} shrugs. "Then the translation will remain hidden from you. May your paths lead you safely." She turns – the door falls shut.`,
            options: [
                { label: "Disappointed, head off", next: "end" }
            ]
        },
        end: {
            text: `The wind sweeps over the hills of Eleusis. You feel the encounter is over. Perhaps it was a dream. Perhaps not.`,
            options: [
                { label: "🔁 Begin again from the start", next: "start" }
            ]
        }
    };

    let currentNode = "start";

    function render() {
        const node = storyGraph[currentNode];
        if (!node) {
            document.getElementById("storyText").innerText = "The Mysteries are silent… (path error)";
            document.getElementById("choicesContainer").innerHTML = '<button class="choice-btn" onclick="location.reload()">Restart</button>';
            return;
        }

        document.getElementById("storyText").innerText = node.text;
        const choicesDiv = document.getElementById("choicesContainer");
        choicesDiv.innerHTML = "";

        if (!node.options || node.options.length === 0) {
            const resetBtn = document.createElement("button");
            resetBtn.className = "choice-btn";
            resetBtn.innerText = "Begin again";
            resetBtn.onclick = () => {
                currentNode = "start";
                render();
            };
            choicesDiv.appendChild(resetBtn);
            return;
        }

        node.options.forEach(opt => {
            const btn = document.createElement("button");
            btn.className = "choice-btn";
            btn.innerText = opt.label;
            btn.onclick = () => {
                currentNode = opt.next;
                render();
            };
            choicesDiv.appendChild(btn);
        });
    }

    render();
</script>
</body>
</html>
