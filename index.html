<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalliopi-Angeliki-Papadopoulou-of-Eleusis</title>
    <meta name="description" content="She awaits any eager follower. The Eleusinian mysteries are not for the faint of heart." />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f4f0e6;
            font-family: 'Segoe UI', 'Georgia', 'Times New Roman', serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: #fffef7;
            border-radius: 24px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            border: 1px solid #e6dfcf;
        }

        .header {
            background: #2c2b28;
            color: #f0e8d5;
            padding: 1.2rem 1.8rem;
            text-align: center;
            border-bottom: 3px solid #b89a6b;
        }

        .header h1 {
            font-size: 1.3rem;
            font-weight: 400;
            letter-spacing: 1px;
            word-break: break-word;
        }

        .header p {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 6px;
            font-family: monospace;
        }

        .story-card {
            padding: 2rem 1.8rem;
            background: #ffffff;
            border-bottom: 1px solid #ede6d9;
        }

        .story-text {
            font-size: 1.2rem;
            line-height: 1.5;
            color: #2d2a24;
            font-weight: 450;
        }

        /* Scroll / parchment style for the translation */
        .scroll {
            background: #fef7e0;
            padding: 1.8rem;
            margin: 1rem 0 0.5rem;
            border-radius: 12px;
            border-left: 6px solid #b89a6b;
            border-right: 2px solid #e0d5b5;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.02), 0 4px 12px rgba(0,0,0,0.05);
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 1rem;
            line-height: 1.6;
            color: #2c281f;
        }

        .scroll p {
            margin-bottom: 1rem;
        }

        .scroll p:last-child {
            margin-bottom: 0;
        }

        .choices-area {
            padding: 1.2rem 1.8rem 2rem 1.8rem;
            background: #fefcf7;
        }

        .choice-btn {
            display: block;
            width: 100%;
            margin-bottom: 0.8rem;
            padding: 0.9rem 1.2rem;
            background: #f1ede4;
            border: 1px solid #dbd2c2;
            border-radius: 40px;
            font-size: 1rem;
            font-family: inherit;
            color: #3a352c;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .choice-btn:hover {
            background: #e7dfd2;
            border-color: #b89a6b;
            transform: translateX(4px);
        }

        .choice-btn:active {
            background: #d9cebc;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            padding: 1rem;
            color: #a39b8a;
            border-top: 1px solid #ede6d9;
            background: #fefcf7;
        }

        @media (max-width: 500px) {
            .story-text { font-size: 1rem; }
            .header h1 { font-size: 1rem; }
            .scroll { font-size: 0.9rem; padding: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⚘ Kalliopi Angeliki Papadopoulou of Eleusis ⚘</h1>
        <p>ἡ λογία · the Scholar</p>
    </div>

    <div class="story-card">
        <div class="story-text" id="storyText"></div>
    </div>
    <div class="choices-area" id="choicesContainer"></div>
    <footer>⋆ A quiet place for those who seek old words ⋆</footer>
</div>

<script>
    const ORACLE_NAME = document.title;
    const DISPLAY_NAME = ORACLE_NAME.replace(/-/g, ' ');

    // Helper: Fisher-Yates shuffle (deterministic per call)
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // ----- Secrets (original 6, split into two trios)
    const allSecrets = [
        { label: "„I was born in Calama, Chile, but left when I was four because my German parents got work in Germany.“", next: "secret1" },
        { label: "„I am ambidextrous. Look!“ [writes with left hand, combs hair with right]", next: "secret2" },
        { label: "„As a child, I swallowed a 50-cent coin and had to go to the hospital.“", next: "secret3" },
        { label: "„I have a Greek uncle in politics. Not particularly known, though.“", next: "secret4" },
        { label: "„I've been vegan since I was fourteen, for all the right reasons.“", next: "secret5" },
        { label: "„I have two bunnies at home – one named Schnuckel, one named Hasi.“", next: "secret6" }
    ];
    const trio1 = allSecrets.slice(0, 3);
    const trio2 = allSecrets.slice(3, 6);
    const shuffledSecrets = [...shuffleArray([...trio1]), ...shuffleArray([...trio2])];

    // ----- Context options (2 true, 3 false)
    const trueContexts = [
        { label: "A certain Christopher Illopoly hid a manuscript of an instruction manual. Or was it the British Museum?", isValid: true },
        { label: "It's a commentary on Hesiod's Theogony. The author is unclear.", isValid: true }
    ];
    const falseContexts = [
        { label: "It was unearthed in a subterranean library beneath Alexandria, guarded by a silent brotherhood of scribes.", isValid: false },
        { label: "A Byzantine emperor's private alchemical diary, sealed in a lead casket.", isValid: false },
        { label: "A Venetian merchant brought it from Crete in 1453, just before the city fell. It smells of salt and betrayal.", isValid: false }
    ];
    const allContexts = shuffleArray([...trueContexts, ...falseContexts]);

    // ----- The authentic translation text
    const translationText = `You begin to read the fragile papyrus. The ink has faded, but the words are still clear:

"That the world was born without tongue is no accident of myth but a statement of method. Chaos did not suggest the earth. It demanded it. And so too must the laws that govern any realm — even one so modest as a game of cards played by candlelight or, as I suppose elsewhere, by the pale glow of a dying hearth — be understood not as suggestions offered in the spirit of friendship, but as edicts. Hard. Unyielding. Cut into the bones of the thing.

I am especially severe on this point. I compare the player who ignores a rule to a man who, having been told the location of a door, chooses instead to walk into the wall beside it — not out of ignorance, but out of a kind of decorative stubbornness that benefits no one, least of all himself.

And yet — and here I must pivot without warning, for the truth demands it — it is also true that Chaos did not specify everything. The earth was demanded, yes. But the colour of stones? The temperament of goats? The precise number of stars visible from any given hill in Boeotia on a night in late autumn, and whether the third star from the left is the same one that a shepherd named Damasios swore, in the autumn before last, had spoken to him in the voice of his dead uncle and told him to sell his flock and take to the sea? These things were left open. And what is left open is not a failure of law but its highest generosity.

I draw here an analogy that later scholars will no doubt find difficult. I compare the unwritten spaces between rules to the silence between the notes of a lyre — not empty, but full of permission. The player who finds such a silence is not merely allowed but obligated to fill it with his own invention, provided — and here I return to my earlier severity — that his invention does not cause the lyre to sound as though it were being played by a man who has never heard music and suspects it of being a trap.

The phrase I use, and I use it with full conviction, is this: all is permitted that does not offend the spirit of the song.

There follows now a passage that I suspect will cause some obscurity, for I address you, reader, directly — unusual for a text of this kind, but I have never much cared for convention when it stands between a thought and its destination. I urge you to think outside the pithos, a phrase that I believe I have coined and that I expect will trouble translators for centuries to come. The pithos is the vessel in which all known things are stored, and from which the truly resourceful mind must occasionally escape. I suspect some future grammatikos will insist it is simply a joke. He will be unable to explain what is funny about it. This will be the funniest part.

Go now. Read what has been written. Think on what has not. And where the text is silent, do not mistake its silence for absence. It is waiting for you to speak."`;

    // ----- Decision tree (full, with restored side branches)
    const storyGraph = {
        start: {
            text: `As you enter the old stone house, ${DISPLAY_NAME} looks up from a pile of dusty scrolls. She adjusts her glasses. "A visitor? Rare. What brings you to Eleusis?"`,
            options: [
                { label: "„I seek a translation from ancient Greek.“", next: "askContext" },
                { label: "„Just curiosity. Who are you really?“", next: "whoAreYou" },
                { label: "„I lost my way. Is there a place to rest?“", next: "rest" }
            ]
        },
        // ----- Translation path -----
        askContext: {
            text: `She leans back. "A translation? Of which document? These things always come with a story. Where did this text surface?"`,
            options: allContexts.map(ctx => ({
                label: ctx.label,
                next: ctx.isValid ? "contextTrue" : "contextFalse"
            }))
        },
        contextTrue: {
            text: `She nods slowly. "Ah, I know what you're getting at. Someone else asked about this before. The translation should still be somewhere around here… But before I give it to you, you must tell me a secret. A real one. I'll know if you lie." She crosses her arms. "Go on."`,
            options: [
                { label: "Tell her a secret.", next: "warnSecret" }
            ]
        },
        contextFalse: {
            text: `She frowns. "I've never heard of that. It sounds like you've fallen for some mystical nonsense. There's so much fabricated rubbish out there. Goodbye." She turns back to her scrolls and ignores you.`,
            options: [
                { label: "🔁 Begin again from the start", next: "start" }
            ]
        },
        warnSecret: {
            text: `She raises a finger. "Before you speak – your secret had better be true. I've studied human deceit for decades. Now, choose one:"`,
            options: shuffledSecrets
        },
        secret1: {
            text: `She narrows her eyes. "So… do you have a Chilean passport?" You hesitate. "Yes… no… not really." She sniffs the air theatrically. "Liar. I smell the falsehood on you. You've never even been to Calama. Get out of my house." She points to the door.`,
            options: [{ label: "Leave in shame", next: "dismissed" }]
        },
        secret2: {
            text: `She watches you write with your left hand while combing your hair with your right. Then she grimaces. "You're combing your hair in my study? Disgusting. Have you no manners? Ugh. I'll give you the translation, but only so you leave faster. Here – take the scroll." She hands you a rolled parchment.`,
            options: [{ label: "Take the translation and leave", next: "translationSuccess" }]
        },
        secret3: {
            text: `She stares at you blankly. "I don't care. That's not remotely interesting. Children swallow coins all the time. But fine, a secret is a secret. Here's your translation." She pushes a dusty scroll across the table.`,
            options: [{ label: "Take the translation and leave", next: "translationSuccess" }]
        },
        secret4: {
            text: `Her face darkens. "I knew it the moment you walked in. A corrupt little pig. *Vre maláka* – you and your uncle can rot in the same cesspool. Out!" She throws a sandal at you.`,
            options: [{ label: "Flee", next: "dismissed" }]
        },
        secret5: {
            text: `She rolls her eyes. "That's not even a secret. That's just a dietary preference. Whatever. I'm bored. Here's your translation." She tosses a parchment in your direction. "Now please leave me alone."`,
            options: [{ label: "Take the translation and leave", next: "translationSuccess" }]
        },
        secret6: {
            text: `For the first time, she laughs. "Bunnies? My goats are named *Tzitziki* and *Kleftiko*. They would eat your Schnuckel and Hasi for breakfast. But I like you. Here, take the scroll."`,
            options: [{ label: "Take the translation and leave", next: "translationSuccess" }]
        },
        translationSuccess: {
            text: `She hands you the original papyrus. "Read it carefully. I'll be in the back." You unroll the document and begin to read.`,
            // We'll render the scroll inside the story card dynamically.
            options: [
                { label: "🔁 Begin again from the start", next: "start" }
            ],
            // special flag: this node contains a scroll
            hasScroll: true
        },
        dismissed: {
            text: `The door slams behind you. The wind howls. You are left standing outside, without a translation, feeling thoroughly humbled.`,
            options: [{ label: "🔁 Try again from the start", next: "start" }]
        },
        // ----- Side branch: Who are you really? -----
        whoAreYou: {
            text: `${DISPLAY_NAME} raises an eyebrow. "Some call me a keeper of old things. Others a dreamer. The name you know is only an echo. Do you truly want the truth?"`,
            options: [
                { label: "„Yes, I want to know.“", next: "truth" },
                { label: "„Maybe not after all.“", next: "start" }
            ]
        },
        truth: {
            text: `She leans forward and whispers: "I am the person who programmed your decision tree. And this dialogue ends right here." A spark in her eyes.`,
            options: [
                { label: "„…Touché.“ (Back to the beginning)", next: "start" }
            ]
        },
        // ----- Side branch: Looking for rest -----
        rest: {
            text: `"Rest? Sit on that old olive stump over there. But careful – the goats here steal anything that shines." She disappears for a moment and returns with a jug of water. "Are you here because of some ancient text?"`,
            options: [
                { label: "„Yes, actually. I need a translation.“", next: "askContext" },
                { label: "„No, I just wanted to see the landscape.“", next: "landscape" }
            ]
        },
        landscape: {
            text: `"Then look around. Eleusis is quiet today." She sits next to you and falls silent. After a while she says: "The translation you're not looking for is: 'The yellow liquid is dangerous.'" A final sip of water, then she leaves.`,
            options: [
                { label: "Stand up and leave", next: "endRest" }
            ]
        },
        endRest: {
            text: `The wind sweeps over the hills of Eleusis. You feel the encounter is over. Perhaps it was a dream. Perhaps not.`,
            options: [
                { label: "🔁 Begin again from the start", next: "start" }
            ]
        }
    };

    let currentNode = "start";

    function render() {
        const node = storyGraph[currentNode];
        if (!node) {
            document.getElementById("storyText").innerHTML = "The scholar is silent… (path error)";
            document.getElementById("choicesContainer").innerHTML = '<button class="choice-btn" onclick="location.reload()">Restart</button>';
            return;
        }

        // Display main story text
        const storyDiv = document.getElementById("storyText");
        if (node.hasScroll) {
            // Special rendering: show the scroll content
            storyDiv.innerHTML = `<div class="scroll">${translationText.replace(/\n/g, '<br>')}</div>`;
        } else {
            storyDiv.innerText = node.text;
        }

        const choicesDiv = document.getElementById("choicesContainer");
        choicesDiv.innerHTML = "";

        if (!node.options || node.options.length === 0) {
            const resetBtn = document.createElement("button");
            resetBtn.className = "choice-btn";
            resetBtn.innerText = "Begin again";
            resetBtn.onclick = () => {
                currentNode = "start";
                render();
            };
            choicesDiv.appendChild(resetBtn);
            return;
        }

        node.options.forEach(opt => {
            const btn = document.createElement("button");
            btn.className = "choice-btn";
            btn.innerText = opt.label;
            btn.onclick = () => {
                currentNode = opt.next;
                render();
            };
            choicesDiv.appendChild(btn);
        });
    }

    render();
</script>
</body>
</html>
